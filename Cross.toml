# Cross-compilation configuration for aarch64-unknown-linux-gnu
# Installs C build tools needed for rocksdb compilation

[target.aarch64-unknown-linux-gnu]
# Pre-build hook to install necessary C dev tools in the cross container
# rocksdb/librocksdb-sys needs: standard C headers, clang/gcc, build-essential
pre-build = [
    "apt-get update",
    "apt-get install -y build-essential clang",
]
